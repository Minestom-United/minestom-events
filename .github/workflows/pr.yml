name: Build Pull Request

on: [ pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Assemble core jar
        run: ./gradlew --no-daemon --build-cache --parallel core:build

      - name: Assemble plugin jar
        run: ./gradlew --no-daemon --build-cache --parallel plugin:build
